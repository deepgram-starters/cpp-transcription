[meta]
title = "C++ Transcription Starter"
description = "Get started using Deepgram's speech-to-text with this C++ demo app"
author = "Deepgram DX Team <devrel@deepgram.com> (https://developers.deepgram.com)"
repository = "https://github.com/deepgram-starters/cpp-transcription"
useCase = "transcription"
language = "C++"
framework = "Crow"
sdk = "N/A"
tags = ["speech-to-text", "transcription", "prerecorded", "cpp", "crow"]

[check]
command = ["cmake --version", "g++ --version"]
message = "All prerequisites installed"

[install.pre]
command = "git submodule update --init --recursive"
message = "Submodules initialized"

[install]
command = ["cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake && cmake --build build", "cd frontend && corepack pnpm install"]
message = "Dependencies installed"

[install.post]
command = "test -f .env || cp sample.env .env"
message = "Environment configuration ready"

[start.pre]
command = "test -f .env || (echo '❌ .env not found. Run: cp sample.env .env' && exit 1)"
message = "Environment validated"

[start]
command = ["./build/cpp-transcription", "cd frontend && pnpm run dev -- --port 8080 --no-open"]
parallel = true
message = "Application running on http://localhost:8080"

[update]
command = "git submodule update --remote --merge"
message = "Submodules updated"

[clean]
command = ["rm -rf build", "rm -rf vcpkg_installed", "rm -rf frontend/node_modules", "rm -rf frontend/.vite"]
message = "Build artifacts cleaned"

[test]
command = "cd contracts && ./tests/run-transcription-app.sh"
message = "Tests complete"

[eject-frontend]
command = "make eject-frontend"
message = "Frontend ejected successfully"
